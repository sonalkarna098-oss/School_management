
{% extends "base.html" %}
{% block content %}

<div class="container my-5">
    <div class="row justify-content-center g-5"> <div class="col-lg-4 col-md-6">
            <div class="login-card employee shadow-lg">
                <div class="login-header">EMPLOYEE LOGIN</div>
                <div class="card-body d-flex flex-column justify-content-between p-4">
                    <form action="{{ url_for('login') }}" method="POST" class="h-100 d-flex flex-column justify-content-between">
                        <input type="hidden" name="role" value="teacher">
                        
                        <div class="form-group">
                            <label class="form-label">User Name :</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Password :</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        
                        <div class="text-center">
                            <img src="{{ url_for('static', filename='images/employee-icon.png') }}" alt="Employee" class="role-icon">
                        </div>
                        
                        <button type="submit" class="btn btn-login w-100">LOGIN</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-4 col-md-6">
            <div class="login-card student shadow-lg">
                <div class="login-header">STUDENT LOGIN</div>
                <div class="card-body d-flex flex-column justify-content-between p-4">
                    <form action="{{ url_for('login') }}" method="POST" class="h-100 d-flex flex-column justify-content-between">
                        <input type="hidden" name="role" value="student">
                        
                        <div class="form-group">
                            <label class="form-label">User Name :</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Password :</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        
                        <div class="text-center">
                            <img src="{{ url_for('static', filename='images/student-icon.png') }}" alt="Student" class="role-icon">
                        </div>
                        
                        <button type="submit" class="btn btn-login w-100">LOGIN</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-4 col-md-6">
            <div class="login-card parent shadow-lg">
                <div class="login-header">PARENT LOGIN</div>
                <div class="card-body d-flex flex-column justify-content-between p-4">
                    <form action="{{ url_for('login') }}" method="POST" class="h-100 d-flex flex-column justify-content-between">
                        <input type="hidden" name="role" value="parent">
                        
                        <div class="form-group">
                            <label class="form-label">User Name :</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Password :</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        
                        <div class="text-center">
                            <img src="{{ url_for('static', filename='images/parent-icon.png') }}" alt="Parent" class="role-icon">
                        </div>
                        
                        <button type="submit" class="btn btn-login w-100">LOGIN</button>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <div class="text-center mt-5">
        <p class="text-muted">Click <a href="#" class="text-primary fw-bold text-decoration-none">here</a> to online payment</p>
    </div>
</div>

<style>
    /* Force Square Shape */
    .login-card {
        background: #fff;
        border-radius: 25px; /* 25px Rounded Border */
        overflow: hidden;
        border: none;
        aspect-ratio: 1 / 1; /* This makes it a perfect square */
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-card:hover {
        transform: scale(1.03);
    }

    .card-body {
        flex-grow: 1;
    }

    /* Header Styling */
    .login-header {
        padding: 15px;
        text-align: center;
        color: #fff;
        font-weight: 700;
        text-transform: uppercase;
        font-size: 1rem;
    }

    /* Role Specific Colors */
    .employee .login-header, .employee .btn-login { background-color: #7b1fa2; }
    .student .login-header, .student .btn-login { background-color: #f57c00; }
    .parent .login-header, .parent .btn-login { background-color: #0288d1; }

    /* Icon Styling */
    .role-icon {
        width: 80px;
        height: 80px;
        object-fit: contain;
        margin: 10px 0;
    }

    .form-label {
        font-weight: 600;
        font-size: 0.85rem;
        margin-bottom: 2px;
    }

    .form-control {
        border-radius: 10px;
        background-color: #f8f9fa;
        border: 1px solid #e9ecef;
    }

    .btn-login {
        border: none;
        color: #fff;
        font-weight: 700;
        padding: 12px;
        border-radius: 15px; /* Matches the card vibe */
        margin-top: auto;
    }

    /* Handle responsiveness - on small screens, square might be too tight */
    @media (max-width: 768px) {
        .login-card {
            aspect-ratio: auto;
            min-height: 450px;
        }
    }
</style>

{% endblock %}
