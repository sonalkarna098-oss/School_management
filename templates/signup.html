{% extends "base.html" %}
{% block content %}

<style>
    body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
    .signup-section { margin-top: 60px; padding-bottom: 80px; }
    
    .auth-card { 
        border: none; 
        border-radius: 20px; 
        overflow: hidden; 
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        height: 100%; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        background: white;
    }
    
    .auth-card:hover { 
        transform: translateY(-12px); 
        box-shadow: 0 20px 40px rgba(0,0,0,0.12);
    }

    /* Role Specific Gradients */
    .bg-admin { background: linear-gradient(135deg, #2c3e50, #000000) !important; } 
    .bg-teacher { background: linear-gradient(135deg, #8e24aa, #6a1b9a) !important; } 
    .bg-student { background: linear-gradient(135deg, #fb8c00, #ef6c00) !important; } 
    .bg-parent { background: linear-gradient(135deg, #039be5, #0277bd) !important; }  

    .icon-box {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        color: white;
        font-size: 2.5rem;
    }

    .form-control { border-radius: 12px; padding: 12px; border: 1px solid #e0e0e0; font-size: 0.9rem; }
    .btn-signup { border-radius: 30px; padding: 12px 30px; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; transition: 0.3s; border: none; color: white; width: 100%; }
    .back-link { font-size: 0.85rem; display: block; margin-top: 20px; color: #6c757d; text-decoration: none; font-weight: 600; }
</style>

<div class="container signup-section">
    <div class="text-center mb-5">
        <h2 class="fw-bold text-dark">Portal Registration Center</h2>
        <p class="text-muted">Create your account by selecting your role below</p>
    </div>

    <div class="row g-4 justify-content-center">
        <div class="col-12 col-md-3">
            <div class="card auth-card p-4 text-center">
                <div class="icon-box bg-admin shadow-sm">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h4 class="fw-bold mb-3">ADMIN</h4>
                <form action="/signup" method="POST">
                    <input type="hidden" name="role" value="admin">
                    <div class="mb-3 text-start">
                        <label class="form-label fw-bold small text-muted">ADMIN USERNAME</label>
                        <input type="text" name="username" class="form-control" placeholder="Admin_ID" required>
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label fw-bold small text-muted">PASSWORD</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-signup bg-admin">Create Admin</button>
                </form>
            </div>
        </div>

        <div class="col-12 col-md-3">
            <div class="card auth-card p-4 text-center">
                <div class="icon-box bg-teacher shadow-sm">
                    <i class="bi bi-person-badge"></i>
                </div>
                <h4 class="fw-bold mb-3">FACULTY</h4>
                <form action="/signup" method="POST">
                    <input type="hidden" name="role" value="teacher">
                    <div class="mb-3 text-start">
                        <label class="form-label fw-bold small text-muted">FULL NAME</label>
                        <input type="text" name="username" class="form-control" placeholder="Faculty" required>
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label fw-bold small text-muted">PASSWORD</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-signup bg-teacher">Create Faculty</button>
                </form>
            </div>
        </div>

        <div class="col-12 col-md-3">
            <div class="card auth-card p-4 text-center">
                <div class="icon-box bg-student shadow-sm">
                    <i class="bi bi-mortarboard"></i>
                </div>
                <h4 class="fw-bold mb-3">STUDENT</h4>
                <form action="/signup" method="POST">
                    <input type="hidden" name="role" value="student">
                    <div class="mb-3 text-start">
                        <label class="form-label fw-bold small text-muted">ROLL NO</label>
                        <input type="text" name="username" class="form-control" placeholder="STU-12345" required>
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label fw-bold small text-muted">PASSWORD</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-signup bg-student">Create Student</button>
                </form>
            </div>
        </div>

        <div class="col-12 col-md-3">
            <div class="card auth-card p-4 text-center">
                <div class="icon-box bg-parent shadow-sm">
                    <i class="bi bi-people"></i>
                </div>
                <h4 class="fw-bold mb-3">PARENT</h4>
                <form action="/signup" method="POST">
                    <input type="hidden" name="role" value="parent">
                    <div class="mb-3 text-start">
                        <label class="form-label fw-bold small text-muted">USERNAME</label>
                        <input type="text" name="username" class="form-control" placeholder="Parent_Name" required>
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label fw-bold small text-muted">PASSWORD</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-signup bg-parent">Create Parent</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="text-center mt-4">
        <a href="/login" class="back-link">← Already have an account? Back to Login</a>
    </div>
</div>

{% endblock %}
