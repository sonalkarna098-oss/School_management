{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2 class="fw-bold mb-4">Support Inbox</h2>
    
    <div class="row">
        {% for msg in messages %}
        <div class="col-12 mb-3">
            <div class="card shadow-sm border-0 {% if msg.status == 'unread' %}border-start border-primary border-4{% endif %}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="fw-bold mb-0">{{ msg.full_name }} <small class="text-muted fw-normal">({{ msg.email }})</small></h5>
                        <span class="badge {% if msg.status == 'unread' %}bg-primary{% else %}bg-success{% endif %}">{{ msg.status|upper }}</span>
                    </div>
                    <p class="text-secondary">{{ msg.message }}</p>
                    <hr>
                    
                    {% if msg.response %}
                        <div class="bg-light p-3 rounded mb-3">
                            <strong class="text-success small">Teacher Response:</strong>
                            <p class="mb-0">{{ msg.response }}</p>
                        </div>
                    {% endif %}

                    <div class="d-flex align-items-start gap-2">
                        <form action="{{ url_for('respond_support') }}" method="POST" class="flex-grow-1">
    <input type="hidden" name="message_id" value="{{ msg._id }}">
    <input type="hidden" name="user_email" value="{{ msg.email }}">
    <input type="hidden" name="user_name" value="{{ msg.full_name }}">
    <input type="hidden" name="original_msg" value="{{ msg.message }}">

    <div class="input-group">
        <textarea name="response" class="form-control" rows="2" 
                  placeholder="Type your response here..." required></textarea>
        <button class="btn btn-dark px-4 fw-bold" type="submit">
            Send <i class="bi bi-send-fill ms-2"></i>
        </button>
    </div>
</form>
                        
                        <a href="{{ url_for('delete_support', id=msg._id|string) }}" 
                           class="btn btn-outline-danger shadow-sm" 
                           onclick="return confirm('Delete message?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>

                    <small class="text-muted d-block mt-2">Sent on: {{ msg.timestamp }}</small>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
