{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2 class="fw-bold mb-4">Support Inbox</h2>
    
    <div class="row">
        {% for msg in messages %}
        <div class="col-12 mb-3">
            <div class="card shadow-sm border-0 {% if msg.status == 'unread' %}border-start border-primary border-4{% endif %}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="fw-bold mb-0">{{ msg.full_name }} <small class="text-muted fw-normal">({{ msg.email }})</small></h5>
                        <span class="badge {% if msg.status == 'unread' %}bg-primary{% else %}bg-success{% endif %}">{{ msg.status|upper }}</span>
                    </div>
                    <p class="text-secondary">{{ msg.message }}</p>
                    <hr>
                    
                    {% if msg.response %}
                        <div class="bg-light p-3 rounded mb-3">
                            <strong class="text-success small">Teacher Response:</strong>
                            <p class="mb-0">{{ msg.response }}</p>
                        </div>
                    {% endif %}

                    <form action="{{ url_for('respond_support', id=msg._id) }}" method="POST" class="d-flex gap-2">
                        <input type="text" name="response" class="form-control form-control-sm" placeholder="Type your response here..." required>
                        <button type="submit" class="btn btn-sm btn-dark">Respond</button>
                        <a href="{{ url_for('delete_support', id=msg._id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete message?')"><i class="bi bi-trash"></i></a>
                    </form>
                    <small class="text-muted d-block mt-2">Sent on: {{ msg.timestamp }}</small>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
