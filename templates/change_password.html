{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="bg-primary p-4 text-center text-white">
                    <i class="bi bi-shield-lock fs-1"></i>
                    <h4 class="fw-bold mt-2">Security Settings</h4>
                    <p class="small mb-0 opacity-75">Update your account password</p>
                </div>
                <div class="card-body p-4">
                    {% if error %}
                        <div class="alert alert-danger small rounded-3">{{ error }}</div>
                    {% endif %}
                    {% if success %}
                        <div class="alert alert-success small rounded-3">{{ success }}</div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Current Password</label>
                            <input type="password" name="current_password" class="form-control rounded-pill" required>
                        </div>
                        <hr class="my-4 opacity-25">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-primary">New Password</label>
                            <input type="password" name="new_password" class="form-control rounded-pill" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold text-primary">Confirm New Password</label>
                            <input type="password" name="confirm_password" class="form-control rounded-pill" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary rounded-pill fw-bold py-2 shadow-sm">
                                Update Password
                            </button>
                            <a href="{{ url_for('dashboard') }}" class="btn btn-light rounded-pill small">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
